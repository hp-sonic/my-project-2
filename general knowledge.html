<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Quiz App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f2dcc9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .quiz-container {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 6px;
            background-color: #eee;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: #d38d5f;
            transition: width 0.4s ease;
        }

        /* Header Image */
        .header-image {
            height: 150px;
            background: #ddd url('image/Knowledge Quiz.jpg') center/cover;
            flex-shrink: 0;
        }

        .content { 
            padding: 30px; 
            overflow-y: auto; /* Allows scrolling if review is long */
            flex-grow: 1;
        }
        
        h2 { color: #333; margin-bottom: 10px; font-size: 1.4rem; }
        .q-number { font-size: 0.9rem; color: #888; margin-bottom: 15px; display: block; }

        /* Toggle Switch for Feedback */
        .setting-box {
            margin: 20px 0;
            padding: 15px;
            background: #fff8f4;
            border-radius: 10px;
            border: 1px solid #eee;
            display: inline-block;
            text-align: left;
        }
        .switch-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 0.95rem;
            color: #555;
        }
        .switch-input { margin-right: 10px; transform: scale(1.3); accent-color: #d38d5f; }

        /* Option Buttons */
        .option-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #eee;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            text-align: left;
            padding-left: 20px;
            font-size: 1rem;
        }
        
        /* Standard Selection State */
        .option-btn.selected { border-color: #d38d5f; background: #fff8f4; font-weight: bold; }

        /* Instant Feedback States */
        .option-btn.correct { border-color: #28a745; background-color: #d4edda; color: #155724; }
        .option-btn.wrong { border-color: #dc3545; background-color: #f8d7da; color: #721c24; }
        .option-btn:disabled { cursor: default; opacity: 0.9; }

        /* Navigation */
        .nav-controls { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px; }
        .nav-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .back-btn { background: #eee; color: #555; }
        .next-btn { background: #d38d5f; color: white; }
        .submit-btn { background: #28a745; color: white; }
        .hidden { display: none; }
        
        /* Result Screen Styles */
        #result-text { font-size: 1.6rem; font-weight: bold; color: #333; margin: 20px 0; }
        
        .review-container {
            margin-top: 20px;
            text-align: left;
        }
        .review-card {
            background: #f9f9f9;
            border-left: 5px solid #ccc;
            padding: 10px 15px;
            margin-bottom: 15px;
            border-radius: 4px;
        }
        .review-card.correct-answer { border-left-color: #28a745; background: #e9f7ef; }
        .review-card.wrong-answer { border-left-color: #dc3545; background: #fff5f5; }
        
        .review-q { font-weight: bold; font-size: 0.95rem; margin-bottom: 5px; display: block;}
        .review-user { font-size: 0.85rem; color: #555; display: block;}
        .review-actual { font-size: 0.85rem; color: #28a745; font-weight: bold; display: block;}
    </style>
</head>
<body>

    <div class="quiz-container">
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="header-image"></div>
        
        <!-- Start Screen -->
        <div id="start-screen" class="content">
            <h2>Knowledge Quiz</h2>
            <p>10 Questions • Test your skills!</p>
            
            <div class="setting-box">
                <label class="switch-label">
                    <input type="checkbox" class="switch-input" id="feedback-toggle">
                    Enable Instant Feedback? <br>
                    <span style="font-size:0.8rem; color:#777; margin-left: 5px;">(See answers immediately)</span>
                </label>
            </div>

            <button class="next-btn nav-btn" style="margin-top:10px" onclick="startQuiz()">Start Quiz</button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="content hidden">
            <span class="q-number" id="q-number">Question 1 of 10</span>
            <h2 id="question-text">Question loading...</h2>
            
            <div id="options-container">
                <!-- Options injected here -->
            </div>

            <div class="nav-controls">
                <button class="nav-btn back-btn" id="prev-btn" onclick="prevQuestion()">Back</button>
                <button class="nav-btn next-btn" id="next-btn" onclick="nextQuestion()">Next</button>
                <button class="nav-btn submit-btn hidden" id="submit-btn" onclick="showResults()">Submit</button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="content hidden">
            <h2>Quiz Complete!</h2>
            <div id="result-text"></div>
            <button class="nav-btn next-btn" onclick="location.reload()">Restart Quiz</button>
            
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            
            <h3>Detailed Review</h3>
            <div id="review-list" class="review-container">
                <!-- Detailed answers will go here -->
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            { q: "What is the capital of France?", a: ["Berlin", "Madrid", "Paris", "Rome"], correct: 2 },
            { q: "Which planet is known as the Red Planet?", a: ["Venus", "Mars", "Jupiter", "Saturn"], correct: 1 },
            { q: "Who wrote 'Romeo and Juliet'?", a: ["Charles Dickens", "William Shakespeare", "Mark Twain", "Jane Austen"], correct: 1 },
            { q: "What is the largest ocean on Earth?", a: ["Atlantic", "Indian", "Arctic", "Pacific"], correct: 3 },
            { q: "How many colors are in a rainbow?", a: ["5", "6", "7", "8"], correct: 2 },
            { q: "Which animal is the fastest on land?", a: ["Lion", "Cheetah", "Horse", "Greyhound"], correct: 1 },
            { q: "What is the boiling point of water?", a: ["90°C", "100°C", "110°C", "120°C"], correct: 1 },
            { q: "Which country is famous for the Pyramids?", a: ["Mexico", "China", "Egypt", "India"], correct: 2 },
            { q: "What is the square root of 64?", a: ["6", "7", "8", "9"], correct: 2 },
            { q: "Which element does 'O' represent?", a: ["Gold", "Oxygen", "Osmium", "Silver"], correct: 1 }
        ];

        let currentIdx = 0;
        let userAnswers = new Array(quizData.length).fill(null);
        let instantFeedback = false;

        function startQuiz() {
            // Check if user wants instant feedback
            instantFeedback = document.getElementById('feedback-toggle').checked;

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const data = quizData[currentIdx];
            
            // Update Progress Bar
            const progressPercent = ((currentIdx + 1) / quizData.length) * 100;
            document.getElementById('progress-bar').style.width = `${progressPercent}%`;

            // Update Text
            document.getElementById('q-number').innerText = `Question ${currentIdx + 1} of ${quizData.length}`;
            document.getElementById('question-text').innerText = data.q;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            data.a.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.classList.add('option-btn');

                // Restore previous state
                const isSelected = (userAnswers[currentIdx] === i);
                
                if (instantFeedback && userAnswers[currentIdx] !== null) {
                    // If answered in Instant Mode, show colors permanently
                    btn.disabled = true; // Lock buttons
                    if (i === data.correct) {
                        btn.classList.add('correct');
                    } else if (isSelected) {
                        btn.classList.add('wrong');
                    }
                } else {
                    // Normal Mode Highlight
                    if (isSelected) btn.classList.add('selected');
                }

                // Click Handler
                btn.onclick = () => handleOptionClick(i, btn, container);
                
                container.appendChild(btn);
            });

            // Navigation Logic
            document.getElementById('prev-btn').style.visibility = (currentIdx === 0) ? "hidden" : "visible";
            
            if (currentIdx === quizData.length - 1) {
                document.getElementById('next-btn').classList.add('hidden');
                document.getElementById('submit-btn').classList.remove('hidden');
            } else {
                document.getElementById('next-btn').classList.remove('hidden');
                document.getElementById('submit-btn').classList.add('hidden');
            }
        }

        function handleOptionClick(index, btn, container) {
            if (instantFeedback && userAnswers[currentIdx] !== null) return; // Prevent changing if locked

            userAnswers[currentIdx] = index;

            if (instantFeedback) {
                // Lock all buttons immediately
                const buttons = container.querySelectorAll('.option-btn');
                buttons.forEach((b, idx) => {
                    b.disabled = true;
                    if (idx === quizData[currentIdx].correct) {
                        b.classList.add('correct'); // Show correct answer
                    }
                });

                // If user was wrong, mark red
                if (index !== quizData[currentIdx].correct) {
                    btn.classList.add('wrong');
                }
            } else {
                // Standard Mode: Just re-render to update selection class
                renderQuestion();
            }
        }

        function nextQuestion() {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                renderQuestion();
            }
        }

        function prevQuestion() {
            if (currentIdx > 0) {
                currentIdx--;
                renderQuestion();
            }
        }

        function showResults() {
            let score = 0;
            const reviewContainer = document.getElementById('review-list');
            reviewContainer.innerHTML = ""; // Clear previous

            userAnswers.forEach((ans, i) => {
                const data = quizData[i];
                const isCorrect = (ans === data.correct);
                if(isCorrect) score++;

                // Create Detailed Review Card
                const card = document.createElement('div');
                card.classList.add('review-card');
                card.classList.add(isCorrect ? 'correct-answer' : 'wrong-answer');

                const qText = `<span class="review-q">${i+1}. ${data.q}</span>`;
                const userText = `<span class="review-user">Your Answer: <b>${ans !== null ? data.a[ans] : "Skipped"}</b></span>`;
                const correctText = !isCorrect ? `<span class="review-actual">Correct Answer: ${data.a[data.correct]}</span>` : "";

                card.innerHTML = qText + userText + correctText;
                reviewContainer.appendChild(card);
            });

            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('result-text').innerText = `Score: ${score} / ${quizData.length}`;
        }
    </script>
</body>
</html>
