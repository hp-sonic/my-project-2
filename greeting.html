<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Master Quiz</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f2dcc9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .quiz-container {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            display: flex;
            flex-direction: column;
            max-height: 90vh;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 6px;
            background-color: #eee;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: #d38d5f;
            transition: width 0.4s ease;
        }

        /* Image Section */
        .image-container { width: 100%; height: 220px; background-color: #ddd; overflow: hidden; flex-shrink: 0; }
        #question-img { width: 100%; height: 100%; object-fit: cover; display: block; transition: 0.5s ease; }

        .content { padding: 25px; overflow-y: auto; flex-grow: 1; }
        h2 { color: #333; margin-bottom: 10px; font-size: 1.4rem; line-height: 1.3; }
        .q-number { font-size: 0.85rem; color: #a1887f; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; display: block; letter-spacing: 1px; }

        /* Toggle Switch */
        .setting-box {
            margin: 20px 0; padding: 15px; background: #fff8f4; border-radius: 10px;
            border: 1px solid #eee; display: inline-block; text-align: left; width: 100%;
        }
        .switch-label { display: flex; align-items: center; cursor: pointer; font-size: 0.95rem; color: #555; }
        .switch-input { margin-right: 10px; transform: scale(1.3); accent-color: #d38d5f; }

        /* Option Buttons */
        .option-btn {
            display: block; width: 100%; padding: 12px; margin: 8px 0;
            border: 2px solid #eee; background: white; border-radius: 10px;
            cursor: pointer; transition: 0.2s; text-align: left; padding-left: 20px; font-size: 1rem;
        }
        
        /* States */
        .option-btn.selected { border-color: #d38d5f; background: #fff8f4; font-weight: bold; color: #8d5d3f; }
        .option-btn.correct { border-color: #28a745; background-color: #d4edda; color: #155724; }
        .option-btn.wrong { border-color: #dc3545; background-color: #f8d7da; color: #721c24; }
        .option-btn:disabled { cursor: default; opacity: 0.9; }

        /* Navigation */
        .nav-controls { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px; }
        .nav-btn {
            flex: 1; padding: 12px; border: none; border-radius: 10px;
            cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 0.9rem;
        }
        .back-btn { background: #eee; color: #555; }
        .next-btn { background: #d38d5f; color: white; }
        .submit-btn { background: #2e7d32; color: white; }
        .hidden { display: none; }
        
        /* Results & Review */
        #result-text { font-size: 1.5rem; font-weight: bold; color: #333; margin: 20px 0; }
        .footer-credit { margin-top: 15px; font-size: 0.8rem; color: #999; }

        .review-container { margin-top: 20px; text-align: left; }
        .review-card {
            background: #f9f9f9; border-left: 5px solid #ccc;
            padding: 10px 15px; margin-bottom: 15px; border-radius: 4px;
        }
        .review-card.correct-answer { border-left-color: #28a745; background: #e9f7ef; }
        .review-card.wrong-answer { border-left-color: #dc3545; background: #fff5f5; }
        
        .review-q { font-weight: bold; font-size: 0.95rem; margin-bottom: 5px; display: block;}
        .review-user { font-size: 0.85rem; color: #555; display: block;}
        .review-actual { font-size: 0.85rem; color: #28a745; font-weight: bold; display: block;}

    </style>
</head>
<body>

    <div class="quiz-container">
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="image-container">
            <img id="question-img" src="image/Guess the Language! Quiz image 0.jpg" alt="Languages">
        </div>
        
        <!-- Start Screen -->
        <div id="start-screen" class="content">
            <h2>Guess the Language! Quiz</h2>
            <p>10 Questions to test your knowledge of world greetings.</p>
            
            <div class="setting-box">
                <label class="switch-label">
                    <input type="checkbox" class="switch-input" id="feedback-toggle">
                    <b>Enable Instant Feedback?</b>
                </label>
                <div style="font-size:0.8rem; color:#777; margin-top:5px; margin-left: 28px;">
                    See correct answers immediately after clicking.
                </div>
            </div>

            <button class="next-btn nav-btn" style="margin-top:10px" onclick="startQuiz()">Start Quiz</button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="content hidden">
            <span class="q-number" id="q-number">QUESTION 1 OF 10</span>
            <h2 id="question-text">Question loading...</h2>
            <div id="options-container"></div>
            
            <div class="nav-controls">
                <button class="nav-btn back-btn" id="prev-btn" onclick="prevQuestion()">Back</button>
                <button class="nav-btn next-btn" id="next-btn" onclick="nextQuestion()">Next</button>
                <button class="nav-btn submit-btn hidden" id="submit-btn" onclick="showResults()">Submit Quiz</button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="content hidden">
            <h2>Quiz Complete!</h2>
            <div id="result-text"></div>
            <button class="nav-btn next-btn" onclick="location.reload()">Try Again</button>
            
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            
            <h3 style="text-align: left; margin-bottom: 15px;">Answer Key:</h3>
            <div id="review-list" class="review-container"></div>
            
            <p class="footer-credit">Images from Unsplash</p>
        </div>
    </div>

    <script>
        const quizData = [
            { q: "What language is 'Bonjour'?", a: ["French", "Spanish", "German"], correct: 0, img: "Guess the Language! Quiz image 1.jpg" },
            { q: "What language is 'Ciao'?", a: ["English", "Italian", "Greek"], correct: 1, img: "Guess the Language! Quiz image 2.jpg" },
            { q: "What language is 'Hola'?", a: ["Spanish", "French", "Latin"], correct: 0, img: "Guess the Language! Quiz image 3.jpg" },
            { q: "What language is 'Konnichiwa'?", a: ["Chinese", "Japanese", "Korean"], correct: 1, img: "Guess the Language! Quiz image 4.jpg" },
            { q: "What language is 'Namaste'?", a: ["Hindi", "Arabic", "Thai"], correct: 0, img: "Guess the Language! Quiz image 5.jpg" },
            { q: "What language is 'Guten Tag'?", a: ["Dutch", "German", "Danish"], correct: 1, img: "Guess the Language! Quiz image 6.jpg" },
            { q: "What language is 'Olá'?", a: ["Spanish", "Portuguese", "Italian"], correct: 1, img: "Guess the Language! Quiz image 7.jpg" },
            { q: "What language is 'Shalom'?", a: ["Hebrew", "Arabic", "Turkish"], correct: 0, img: "Guess the Language! Quiz image 8.jpg" },
            { q: "What language is 'Jambo'?", a: ["Zulu", "Swahili", "Xhosa"], correct: 1, img: "Guess the Language! Quiz image 9.jpg" },
            { q: "What language is 'Sawubona'?", a: ["Zulu", "Swahili", "Sotho"], correct: 0, img: "Guess the Language! Quiz image 10.jpg" }
        ];

        let currentIdx = 0;
        let userAnswers = new Array(quizData.length).fill(null);
        let instantFeedback = false;

        function startQuiz() {
            instantFeedback = document.getElementById('feedback-toggle').checked;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const data = quizData[currentIdx];
            
            // Update Progress & Image
            const progressPercent = ((currentIdx + 1) / quizData.length) * 100;
            document.getElementById('progress-bar').style.width = `${progressPercent}%`;
            document.getElementById('q-number').innerText = `QUESTION ${currentIdx + 1} OF 10`;
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('question-img').src = data.img;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            data.a.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.classList.add('option-btn');

                // Restore State
                const isSelected = (userAnswers[currentIdx] === i);
                
                if (instantFeedback && userAnswers[currentIdx] !== null) {
                    btn.disabled = true; 
                    if (i === data.correct) {
                        btn.classList.add('correct');
                    } else if (isSelected) {
                        btn.classList.add('wrong');
                    }
                } else {
                    if (isSelected) btn.classList.add('selected');
                }

                btn.onclick = () => handleOptionClick(i, btn, container);
                container.appendChild(btn);
            });

            document.getElementById('prev-btn').style.visibility = (currentIdx === 0) ? "hidden" : "visible";
            document.getElementById('next-btn').classList.toggle('hidden', currentIdx === 9);
            document.getElementById('submit-btn').classList.toggle('hidden', currentIdx < 9);
        }

        function handleOptionClick(index, btn, container) {
            if (instantFeedback && userAnswers[currentIdx] !== null) return; 

            userAnswers[currentIdx] = index;

            if (instantFeedback) {
                const buttons = container.querySelectorAll('.option-btn');
                buttons.forEach((b, idx) => {
                    b.disabled = true;
                    if (idx === quizData[currentIdx].correct) b.classList.add('correct');
                });
                if (index !== quizData[currentIdx].correct) btn.classList.add('wrong');
            } else {
                renderQuestion();
            }
        }

        function nextQuestion() { if (currentIdx < 9) { currentIdx++; renderQuestion(); } }
        function prevQuestion() { if (currentIdx > 0) { currentIdx--; renderQuestion(); } }

        function showResults() {
            let score = 0;
            const reviewContainer = document.getElementById('review-list');
            reviewContainer.innerHTML = "";

            userAnswers.forEach((ans, i) => {
                const data = quizData[i];
                const isCorrect = (ans === data.correct);
                if(isCorrect) score++;

                // Detailed Review Card Generation
                const card = document.createElement('div');
                card.classList.add('review-card', isCorrect ? 'correct-answer' : 'wrong-answer');
                
                const qText = `<span class="review-q">${i+1}. ${data.q}</span>`;
                const userText = `<span class="review-user">Your Answer: <b>${ans !== null ? data.a[ans] : "Skipped"}</b></span>`;
                const correctText = !isCorrect ? `<span class="review-actual">Correct: ${data.a[data.correct]}</span>` : "";

                card.innerHTML = qText + userText + correctText;
                reviewContainer.appendChild(card);
            });

            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('result-text').innerText = `You got ${score} out of 10!`;
            
            // Set a celebratory ending image
            document.getElementById('question-img').src = "image/Guess the Language! Quiz image 11.jpg";
        }
    </script>
</body>
</html>
